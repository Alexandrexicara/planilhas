{% extends "base.html" %}

{% block title %}Criar Superadmin - planilhas.com{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Logo -->
            <div class="text-center mb-5">
                <h1 class="text-white mb-2">
                    <i class="fas fa-user-shield"></i> Criar Superadmin
                </h1>
                <p class="text-white-50">Acesso administrativo</p>
            </div>

            <!-- Create Superadmin Card -->
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <h3 class="card-title mb-4">
                        <i class="fas fa-user-plus text-warning"></i> Criar Superadmin Manualmente
                    </h3>

                    <!-- Status Message -->
                    <div id="statusMessage" class="alert alert-dismissible fade" role="alert" style="display: none;">
                        <span id="statusText"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Create Superadmin Form -->
                    <form method="POST" id="createSuperadminForm">
                        <div class="mb-3">
                            <label for="emailSuperadmin" class="form-label">Email do Superadmin</label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="emailSuperadmin" 
                                name="email"
                                value="superadmin@planilhas.com"
                                placeholder="superadmin@planilhas.com"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="senhaSuperadmin" class="form-label">Senha</label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg" 
                                id="senhaSuperadmin" 
                                name="senha"
                                value="GpA1XmI86lGB309W"
                                placeholder="GpA1XmI86lGB309W"
                                required
                            >
                        </div>

                        <hr class="my-4">

                        <h6 class="text-muted">Usuário Comum (para testes)</h6>
                        
                        <div class="mb-3">
                            <label for="emailUser" class="form-label">Email do Usuário</label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="emailUser" 
                                name="email_user"
                                value="santossilvac990@gmail.com"
                                placeholder="santossilvac990@gmail.com"
                            >
                        </div>

                        <div class="mb-3">
                            <label for="senhaUser" class="form-label">Senha do Usuário</label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg" 
                                id="senhaUser" 
                                name="senha_user"
                                value="celio48santos"
                                placeholder="celio48santos"
                            >
                        </div>

                        <button type="submit" class="btn btn-warning w-100 btn-lg">
                            <i class="fas fa-user-shield"></i> Criar Superadmin
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/executar-sistema" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-play"></i> Ir para Sistema
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
console.log('=== CREATE SUPERADMIN PAGE SCRIPT ===');

// Create Superadmin Form
var createSuperadminForm = document.getElementById('createSuperadminForm');
if (createSuperadminForm) {
    createSuperadminForm.onsubmit = async function(e) {
        e.preventDefault();
        
        var email = document.getElementById('emailSuperadmin').value;
        var senha = document.getElementById('senhaSuperadmin').value;
        
        try {
            console.log('=== CRIANDO SUPERADMIN ===');
            console.log('Email:', email);
            console.log('Senha:', senha ? '***' : 'vazia');
            
            // Criar superadmin via API
            var formData = new FormData();
            formData.append('email', email);
            formData.append('senha', senha);
            
            var response = await fetch('/admin/create-superadmin', {
                method: 'POST',
                body: formData
            });
            
            console.log('Response status:', response.status);
            var responseText = await response.text();
            console.log('Response text:', responseText);
            
            if (response.ok) {
                Utils.showStatus('Superadmin criado com sucesso!', 'success');
                setTimeout(function() {
                    window.location.href = '/executar-sistema';
                }, 2000);
            } else {
                Utils.showStatus('Erro ao criar superadmin', 'danger');
            }
        } catch (error) {
            console.error('Erro ao criar superadmin:', error);
            Utils.showStatus('Erro: ' + error.message, 'danger');
        }
    };
}

console.log('=== CREATE SUPERADMIN SCRIPT CARREGADO ===');
</script>
{% endblock %}
