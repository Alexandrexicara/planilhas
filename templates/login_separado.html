{% extends "base.html" %}

{% block title %}Login - planilhas.com{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Logo -->
            <div class="text-center mb-5">
                <h1 class="text-white mb-2">
                    <i class="fas fa-feather"></i> planilhas.com
                </h1>
                <p class="text-white-50">Sistema Completo de Gestão</p>
            </div>

            <!-- Login Card -->
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <h3 class="card-title mb-4">
                        <i class="fas fa-lock text-primary"></i> Entrar no Sistema
                    </h3>

                    <!-- Status Message -->
                    <div id="statusMessage" class="alert alert-dismissible fade" role="alert" style="display: none;">
                        <span id="statusText"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="emailLogin" class="form-label">Email</label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="emailLogin" 
                                name="email"
                                placeholder="seu@email.com"
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label for="senhaLogin" class="form-label">Senha</label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg" 
                                id="senhaLogin" 
                                name="senha"
                                placeholder="Digite sua senha"
                                required
                            >
                        </div>
                        <input type="hidden" name="next" value="{{ next|default('') }}">

                        <button type="submit" class="btn btn-gradient w-100 btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">
                            <small class="text-muted">Não tem uma conta?</small>
                        </p>
                        <a href="/cadastro" class="btn btn-outline-success btn-sm mt-2">
                            <i class="fas fa-user-plus"></i> Criar Conta
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
console.log('=== LOGIN PAGE SCRIPT ===');

// Login Form
var loginForm = document.getElementById('loginForm');
if (loginForm) {
    loginForm.onsubmit = async function(e) {
        e.preventDefault();
        
        var email = document.getElementById('emailLogin').value;
        var senha = document.getElementById('senhaLogin').value;
        var next = document.querySelector('input[name="next"]').value;
        
        try {
            console.log('=== ENVIAND LOGIN COM AuthAPI ===');
            console.log('Email:', email);
            console.log('Senha:', senha ? '***' : 'vazia');
            console.log('Next:', next);
            
            var data = await AuthAPI.login(email, senha, next);
            
            if (data.success) {
                Utils.showStatus('Login realizado com sucesso!', 'success');
                Utils.redirect(data.redirect, 1500);
            } else {
                Utils.showStatus(data.message || 'Erro ao fazer login', 'danger');
            }
        } catch (error) {
            console.error('Erro no login:', error);
            Utils.showStatus('Erro: ' + error.message, 'danger');
        }
    };
}

console.log('=== LOGIN SCRIPT CARREGADO ===');
</script>
{% endblock %}
