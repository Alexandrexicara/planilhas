<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - planilhas.com</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            min-height: 100vh;
            background: var(--primary-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(240, 147, 251, 0.2) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(1deg); }
            66% { transform: translateY(20px) rotate(-1deg); }
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-title {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .logo-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            font-weight: 300;
        }

        /* Form Controls */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: white;
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn-gradient {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-gradient:hover::before {
            left: 100%;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .btn-success-gradient {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-outline-glass {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 12px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .btn-outline-glass:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            color: white;
            transform: translateY(-2px);
        }

        /* Social Buttons */
        .social-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            color: white;
        }

        /* Separator */
        .separator {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .separator span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }

        /* Alert Messages */
        .alert-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #667eea;
            z-index: 10;
        }

        .input-group {
            position: relative;
        }

        /* Loading Spinner */
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-title {
                font-size: 2rem;
            }
            
            .glass-card {
                margin: 0 1rem;
            }
        }

        /* Form Sections */
        .form-section {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Info Box */
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            color: white;
            margin-top: 2rem;
        }

        /* Form Labels */
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        /* Required indicator */
        .required::after {
            content: ' *';
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                
                <!-- Logo Section -->
                <div class="logo-section">
                    <h1 class="logo-title">
                        <i class="fas fa-file-excel"></i>
                        planilhas.com
                    </h1>
                    <p class="logo-subtitle">Sistema Completo de Gestão</p>
                </div>

                <!-- Login Card -->
                <div class="glass-card form-section mb-4">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4 text-center">
                            <i class="fas fa-lock text-primary"></i> Entrar no Sistema
                        </h3>

                        <!-- Status Message -->
                        <div id="statusMessage" class="alert alert-dismissible fade" role="alert" style="display: none;">
                            <span id="statusText"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Login Form -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="emailLogin" class="form-label required">Email</label>
                                <div class="input-group">
                                    <input 
                                        type="email" 
                                        class="form-control form-control-lg" 
                                        id="emailLogin" 
                                        name="email"
                                        placeholder="seu@email.com"
                                        value="superadmin@planilhas.com"
                                        required
                                    >
                                    <span class="input-group-text">
                                        <i class="fas fa-envelope text-primary"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="senhaLogin" class="form-label required">Senha</label>
                                <div class="input-group">
                                    <input 
                                        type="password" 
                                        class="form-control form-control-lg" 
                                        id="senhaLogin" 
                                        name="senha"
                                        placeholder="Digite sua senha"
                                        required
                                    >
                                    <span class="password-toggle" onclick="togglePassword('senhaLogin')">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <input type="hidden" name="next" value="">

                            <button type="submit" class="btn btn-gradient w-100 btn-lg" id="loginBtn">
                                <i class="fas fa-sign-in-alt"></i> Entrar
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <small class="text-white-50">Ou continue com:</small>
                            <div class="mt-2 d-flex gap-2 justify-content-center">
                                <button class="social-btn">
                                    <i class="fab fa-google"></i> Google
                                </button>
                                <button class="social-btn">
                                    <i class="fab fa-github"></i> GitHub
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Register Link -->
                <div class="text-center mt-4">
                    <p class="text-white-50 mb-3">Não tem uma conta?</p>
                    <a href="{{ url_for('cadastro_page') }}" class="btn btn-outline-glass btn-lg">
                        <i class="fas fa-user-plus"></i> Criar Conta
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle Password Visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const toggle = field.nextElementSibling.querySelector('i');
            
            if (field.type === 'password') {
                field.type = 'text';
                toggle.className = 'fas fa-eye-slash';
            } else {
                field.type = 'password';
                toggle.className = 'fas fa-eye';
            }
        }

        // Show Status Message
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            
            statusDiv.className = `alert alert-${type} alert-dismissible fade show alert-glass`;
            statusText.textContent = message;
            statusDiv.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        // Set Loading State
        function setLoading(buttonId, loading = true) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Processando...';
            } else {
                button.disabled = false;
                button.innerHTML = button.id === 'loginBtn' ? 
                    '<i class="fas fa-sign-in-alt"></i> Entrar' : 
                    '<i class="fas fa-user-check"></i> Cadastrar Agora';
            }
        }

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            console.log('=== DEBUG LOGIN FORM ===');
            
            setLoading('loginBtn', true);
            
            const formData = new FormData(this);
            const email = formData.get('email');
            const senha = formData.get('senha');
            
            console.log('Email:', email);
            console.log('Senha length:', senha.length);
            console.log('FormData entries:');
            for (let [key, value] of formData.entries()) {
                console.log(`${key}: ${key === 'senha' ? '***' : value}`);
            }
            
            try {
                console.log('Enviando requisição POST para /login...');
                
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    console.log('Login successful, redirecting to:', data.redirect);
                    showStatus('Login realizado com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/sistema';
                    }, 1500);
                } else {
                    console.log('Login failed:', data.message);
                    showStatus(data.message, 'danger');
                }
            } catch (error) {
                console.error('Login error:', error);
                console.error('Error stack:', error.stack);
                showStatus('Erro ao conectar com o servidor', 'danger');
            } finally {
                setLoading('loginBtn', false);
            }
        });

        // Add some entrance animations
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.form-section');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.2}s`;
            });
        });
    </script>
</body>
</html>
